<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>PyVis Network</title>
  <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis.min.js"></script>
  <script type="text/javascript" src="js/qwebchannel.js"></script>

  <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.16.1/vis-network.min.css" rel="stylesheet" type="text/css" />
  <style type="text/css">
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }  
    #mynetwork {
      width: 100%;
      height: 100%;
      border: 1px solid lightgray;
    }
  </style>
</head>
<body>

<div id="mynetwork"></div>

<script type="text/javascript">
window.addEventListener('load', function () {
  var nodes = {{ nodes|safe }};
  var edges = {{ edges|safe }};
  var data = { nodes: nodes, edges: edges };
  var options = {{ options|safe }};

  var container = document.getElementById('mynetwork');
  var network = new vis.Network(container, data, options);

  if (typeof QWebChannel !== 'undefined') {
    new QWebChannel(qt.webChannelTransport, function(channel) {
      window.bridge = channel.objects.bridge;
      network.on("click", function(params) {
        if (params.nodes.length > 0) {
          var nodeId = params.nodes[0];
          var node = nodes.find(n => n.id === nodeId);
          if (node && window.bridge){
            window.bridge.set_reference(
              node.id.toString(),
              node.local_id || "",
              node.label || "",
              node.source || ""
            );
          } 
        }
      });
    });
  } else {
    console.error("QWebChannel is not defined");
  }
});
</script>

</body>
</html>
